<button
id="chat-toggle"
class="fixed bottom-24 sm:bottom-6 right-6 w-14 h-14 sm:w-16 sm:h-16
bg-gradient-to-r from-blue-600 to-indigo-600
rounded-2xl sm:rounded-3xl text-white text-xl sm:text-2xl
shadow-[0_15px_40px_rgba(37,99,235,0.35)]
z-[9999] hover:scale-110 hover:rotate-6
transition duration-300">
    <i class="fa-solid fa-robot"></i>
</button>

<div
id="chat-container"
class="hidden fixed inset-0 sm:inset-auto sm:bottom-24 sm:right-6
w-full h-full sm:w-[360px] sm:h-[500px]
backdrop-blur-xl bg-white/95
border-none sm:border sm:border-white/30
rounded-none sm:rounded-[2rem]
shadow-[0_30px_80px_rgba(0,0,0,0.18)]
flex flex-col overflow-hidden z-[9999]">

    <div class="bg-gradient-to-r from-blue-600 via-indigo-600 to-violet-600 p-4 sm:p-4 text-white shrink-0 pt-10 sm:pt-4">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 sm:w-11 sm:h-11 rounded-xl sm:rounded-2xl
                            bg-white/20 backdrop-blur
                            flex items-center justify-center
                            text-lg sm:text-xl shadow-lg shrink-0">
                    <i class="fa-solid fa-robot"></i>
                </div>

                <div>
                    <h3 class="font-black text-sm sm:text-base tracking-tight leading-tight">
                        TrendReco Assistant
                    </h3>
                    <div class="flex items-center gap-1.5 mt-0.5">
                        <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                        <p class="text-[11px] sm:text-xs opacity-90">
                            Online sekarang
                        </p>
                    </div>
                </div>
            </div>

            <button
            id="close-chat"
            class="w-9 h-9 rounded-xl hover:bg-white/20 transition flex items-center justify-center cursor-pointer text-white"
            type="button">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
        </div>
    </div>

    <div class="p-2.5 border-b bg-slate-50 shrink-0">
        <div class="flex gap-2 overflow-x-auto no-scrollbar scroll-smooth">
            <button onclick="quickAsk('customer service')"
                    class="px-3 py-1 rounded-full bg-amber-100 hover:bg-amber-500 hover:text-white text-amber-700 text-xs whitespace-nowrap transition">
                <i class="fa-solid fa-headset mr-1"></i> Customer Service
            </button>

            <button onclick="quickAsk('tren konten')"
                    class="px-3 py-1 rounded-full bg-blue-100 hover:bg-blue-600 hover:text-white text-blue-700 text-xs whitespace-nowrap transition">
                <i class="fa-solid fa-chart-line mr-1"></i> Tren
            </button>

            <button onclick="quickAsk('jam upload')"
                    class="px-3 py-1 rounded-full bg-blue-100 hover:bg-blue-600 hover:text-white text-blue-700 text-xs whitespace-nowrap transition">
                <i class="fa-regular fa-clock mr-1"></i> Upload
            </button>

            <button onclick="quickAsk('engagement')"
                    class="px-3 py-1 rounded-full bg-blue-100 hover:bg-blue-600 hover:text-white text-blue-700 text-xs whitespace-nowrap transition">
                <i class="fa-solid fa-heart mr-1"></i> Engagement
            </button>

            <button onclick="quickAsk('algoritma')"
                    class="px-3 py-1 rounded-full bg-blue-100 hover:bg-blue-600 hover:text-white text-blue-700 text-xs whitespace-nowrap transition">
                <i class="fa-solid fa-gears mr-1"></i> Algoritma
            </button>
        </div>
    </div>

    <div
    id="chat-body"
    class="flex-1 overflow-y-auto p-4 bg-slate-100 space-y-4">
        <div class="flex gap-3">
            <div class="w-8 h-8 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white flex items-center justify-center shadow-lg shrink-0 text-xs">
                <i class="fa-solid fa-robot"></i>
            </div>
            <div>
                <div class="bg-white p-3 sm:p-3.5 rounded-[1.2rem] rounded-tl-sm shadow-2xs max-w-[85%] sm:max-w-[240px]">
                    <p class="leading-relaxed text-slate-700 text-xs sm:text-sm">
                        Halo 👋<br><br>
                        Selamat datang di <b>TrendReco Assistant</b>.<br><br>
                        Saya siap membantu Anda mengenai tren konten, strategi media sosial, serta penggunaan sistem TrendReco.
                    </p>
                </div>
                <p class="text-[10px] text-slate-400 mt-1.5 ml-1">baru saja</p>
            </div>
        </div>
    </div>

    <div id="typing" class="hidden px-4 py-2 text-xs text-slate-500 bg-slate-50 border-t border-slate-100 shrink-0">
        <div class="flex items-center gap-2">
            <div class="flex gap-0.5">
                <span class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-bounce"></span>
                <span class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-bounce [animation-delay:0.2s]"></span>
                <span class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-bounce [animation-delay:0.4s]"></span>
            </div>
            <span>TrendReco sedang mengetik...</span>
        </div>
    </div>

    <div class="border-t bg-white p-3 shrink-0 pb-6 sm:pb-3">
        <div class="flex gap-2 sm:gap-3">
            <input
            id="chat-input"
            type="text"
            placeholder="Tanyakan sesuatu..."
            class="flex-1 bg-slate-100 text-sm rounded-xl sm:rounded-2xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800">

            <button
            id="send-chat"
            class="w-11 h-11 sm:w-12 sm:h-12 rounded-xl sm:rounded-2xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-lg flex items-center justify-center hover:scale-105 active:scale-95 transition shrink-0">
                <i class="fa-solid fa-paper-plane text-xs"></i>
            </button>
        </div>
    </div>

</div>

<style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>

<script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>
